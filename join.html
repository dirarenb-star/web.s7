<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>S7 RP - Join</title>
<style>
body { margin:0; font-family: Arial; background:black; color:white; direction:rtl; overflow-x:hidden; }
canvas{position:fixed;top:0;left:0;z-index:-1;}
.navbar{padding:20px;text-align:center;border-bottom:2px solid gold;box-shadow:0 0 20px gold;animation:glow 2s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 10px gold;}to{box-shadow:0 0 40px gold;}}
.navbar h1{color:gold;text-shadow:0 0 20px gold;}
.menu a{color:gold;text-decoration:none;margin:0 15px;font-weight:bold;}
.menu a:hover{text-shadow:0 0 10px gold;}
.container{padding:50px;text-align:center;}
.logo{width:250px;margin:0 auto 30px;display:block;}
.join-bar{
  background:gold;
  color:black;
  padding:20px;
  border-radius:15px;
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px auto;
  box-shadow:0 0 20px gold;
  flex-wrap:wrap;
}
.join-bar a{
  display:inline-block;
  padding:15px 25px;
  background:black;
  color:gold;
  border-radius:10px;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}
.join-bar a:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px gold;
}
footer{text-align:center;padding:20px;color:gray;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="navbar">
  <h1>🔥 S7 RolePlay 🔥</h1>
  <div class="menu">
    <a href="home.html">Home</a>
    <a href="rules.html">Rules</a>
    <a href="join.html">Join</a>
  </div>
</div>

<div class="container">
  <img src="imgs/S7.png" alt="S7 Logo" class="logo">
  <h2>انضم الآن إلى S7 RP</h2>

  <!-- شريط الدخول -->
  <div class="join-bar">
    <a href="https://discord.gg/your-discord-link" target="_blank">دخول ديسكورد</a>
    <a href="mta://your-mta-server" target="_blank">دخول سيرفر MTA</a>
  </div>

  <!-- شريط التحميل -->
  <div class="join-bar">
    <a href="https://www.downloadcomputergames.net/2020/09/download-gta-san-andreas.html" target="_blank">تحميل GTA SA</a>
    <a href="https://multitheftauto.com" target="_blank">تحميل MTA SA</a>
  </div>
</div>

<footer>✨ S7 RP © 2026</footer>

<script>
const canvas=document.getElementById("particles");const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
let particles=[];for(let i=0;i<80;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*3+1,speed:Math.random()*1});}
let mouseX=0,mouseY=0;window.addEventListener("mousemove",e=>{mouseX=e.clientX;mouseY=e.clientY;});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle="gold";particles.forEach(p=>{let px=(mouseX-canvas.width/2)*0.02;let py=(mouseY-canvas.height/2)*0.02;ctx.beginPath();ctx.arc(p.x+px,p.y+py,p.size,0,Math.PI*2);ctx.fill();p.y+=p.speed;if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width;}});requestAnimationFrame(draw);}
draw();window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
